services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-mkp-test}-app
    environment:
      # --- Server ---
      SERVER_ENV: ${SERVER_ENV}
      SERVER_LOG_LEVEL: ${SERVER_LOG_LEVEL}
      SERVER_HOST: ${SERVER_HOST}
      SERVER_PORT: ${SERVER_PORT}
      SERVER_SHUTDOWN_CLEANUP_PERIOD_SECONDS: ${SERVER_SHUTDOWN_CLEANUP_PERIOD_SECONDS}
      SERVER_SHUTDOWN_GRACE_PERIOD_SECONDS: ${SERVER_SHUTDOWN_GRACE_PERIOD_SECONDS}
      # --- App ---
      APP_NAME: ${APP_NAME}
      APP_TIMEZONE: ${APP_TIMEZONE}
      APP_CORS_ALLOW_CREDENTIALS: ${APP_CORS_ALLOW_CREDENTIALS}
      APP_CORS_ALLOWED_HEADERS: ${APP_CORS_ALLOWED_HEADERS}
      APP_CORS_ALLOWED_METHODS: ${APP_CORS_ALLOWED_METHODS}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_CORS_ENABLE: ${APP_CORS_ENABLE}
      APP_CORS_MAX_AGE_SECONDS: ${APP_CORS_MAX_AGE_SECONDS}
      APP_RATE_LIMITER_ENABLE: ${APP_RATE_LIMITER_ENABLE}
      APP_RATE_LIMITER_MAX_REQUESTS: ${APP_RATE_LIMITER_MAX_REQUESTS}
      APP_RATE_LIMITER_WINDOW_SECONDS: ${APP_RATE_LIMITER_WINDOW_SECONDS}
      APP_API_KEY: ${APP_API_KEY}
      # --- JWT ---
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRE_MIN: ${JWT_ACCESS_EXPIRE_MIN}
      JWT_REFRESH_EXPIRE_MIN: ${JWT_REFRESH_EXPIRE_MIN}
      # --- Cache / Redis (host/port overridden for the docker network) ---
      CACHE_REDIS_PRIMARY_HOST: redis
      CACHE_REDIS_PRIMARY_PORT: "6379"
      CACHE_REDIS_PRIMARY_PASSWORD: ${CACHE_REDIS_PRIMARY_PASSWORD}
      CACHE_REDIS_PRIMARY_DB: ${CACHE_REDIS_PRIMARY_DB}
      CACHE_REDIS_PRIMARY_TLS: ${CACHE_REDIS_PRIMARY_TLS}
      CACHE_TTL: ${CACHE_TTL}
      # --- Postgres (host/port overridden for the docker network) ---
      DB_POSTGRES_READ_HOST: postgres
      DB_POSTGRES_READ_PORT: "5432"
      DB_POSTGRES_READ_NAME: ${DB_POSTGRES_READ_NAME}
      DB_POSTGRES_READ_USER: ${DB_POSTGRES_READ_USER}
      DB_POSTGRES_READ_PASSWORD: ${DB_POSTGRES_READ_PASSWORD}
      DB_POSTGRES_READ_TIMEZONE: ${DB_POSTGRES_READ_TIMEZONE}
      DB_POSTGRES_READ_SSL_MODE: ${DB_POSTGRES_READ_SSL_MODE}
      DB_POSTGRES_WRITE_HOST: postgres
      DB_POSTGRES_WRITE_PORT: "5432"
      DB_POSTGRES_WRITE_NAME: ${DB_POSTGRES_WRITE_NAME}
      DB_POSTGRES_WRITE_USER: ${DB_POSTGRES_WRITE_USER}
      DB_POSTGRES_WRITE_PASSWORD: ${DB_POSTGRES_WRITE_PASSWORD}
      DB_POSTGRES_WRITE_TIMEZONE: ${DB_POSTGRES_WRITE_TIMEZONE}
      DB_POSTGRES_WRITE_SSL_MODE: ${DB_POSTGRES_WRITE_SSL_MODE}
      DB_POSTGRES_MAX_RETRY: ${DB_POSTGRES_MAX_RETRY}
      DB_POSTGRES_RETRY_WAIT_TIME: ${DB_POSTGRES_RETRY_WAIT_TIME}
      DB_POSTGRES_MIGRATION_TABLE: ${DB_POSTGRES_MIGRATION_TABLE}
      DB_POSTGRES_AUTO_MIGRATE: ${DB_POSTGRES_AUTO_MIGRATE}
      DB_POSTGRES_PREFIX: ${DB_POSTGRES_PREFIX}
      # --- External (OTLP endpoint overridden -> jaeger) ---
      EXTERNAL_OTEL_ENDPOINT: jaeger:4317
      EXTERNAL_S3_API_ENDPOINT: ${EXTERNAL_S3_API_ENDPOINT}
      EXTERNAL_S3_ACCESS_KEY_ID: ${EXTERNAL_S3_ACCESS_KEY_ID}
      EXTERNAL_S3_SECRET_ACCESS_KEY: ${EXTERNAL_S3_SECRET_ACCESS_KEY}
      EXTERNAL_S3_BUCKET_NAME: ${EXTERNAL_S3_BUCKET_NAME}
      EXTERNAL_S3_PUBLIC_DOMAIN: ${EXTERNAL_S3_PUBLIC_DOMAIN}
      # --- Kafka (brokers -> CLIENT listener, SASL off in-network) ---
      KAFKA_BROKERS: kafka:9093
      KAFKA_ENABLE: ${KAFKA_ENABLE}
      KAFKA_SASL_ENABLE: "false"
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP}
      KAFKA_TOPICS_NOTIFICATION: ${KAFKA_TOPICS_NOTIFICATION}
      KAFKA_TOPICS_REFUND: ${KAFKA_TOPICS_REFUND}
      KAFKA_NOTIFICATION_CONSUMER_GROUP: ${KAFKA_NOTIFICATION_CONSUMER_GROUP}
      KAFKA_NOTIFICATION_MAX_RETRY: ${KAFKA_NOTIFICATION_MAX_RETRY}
      KAFKA_NOTIFICATION_BACKOFF_DURATION: ${KAFKA_NOTIFICATION_BACKOFF_DURATION}
      KAFKA_REFUND_CONSUMER_GROUP: ${KAFKA_REFUND_CONSUMER_GROUP}
      KAFKA_REFUND_MAX_RETRY: ${KAFKA_REFUND_MAX_RETRY}
      KAFKA_REFUND_BACKOFF_DURATION: ${KAFKA_REFUND_BACKOFF_DURATION}
      # --- Asynq ---
      ASYNQ_ENABLE: ${ASYNQ_ENABLE}
      ASYNQ_CONCURRENCY: ${ASYNQ_CONCURRENCY}
      # --- Payment ---
      PAYMENT_MOCK_MODE: ${PAYMENT_MOCK_MODE}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET}
      PAYMENT_EXPIRE_MINUTES: ${PAYMENT_EXPIRE_MINUTES}
      PAYMENT_CALLBACK_BASE_URL: ${PAYMENT_CALLBACK_BASE_URL}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    restart: unless-stopped
